# NativeMinuit.jl Phase 0 §3.4 evidence-gate config
# Drives scripts/run_perf.jl per the julia-perf skill contract.

[mode]
mode = "standalone"

[target]
module = "NativeMinuit"
functions = ["migrad", "_migrad_loop", "numerical_gradient!", "davidon_update!"]

[benchmark]
suite_file = "../benchmark/bench_migrad_suite.jl"
baseline_file = ""
samples = 50
seconds = 20
timeout_seconds = 300

[benchmark.evals]
policy = "auto"
tier_1_threshold_ns = 1000
tier_2_threshold_ns = 1_000_000
fixed_value = 1

[output]
out_dir = ".julia-perf/runs/latest"

[blas]
# Phase 0 §3.4: single-threaded BLAS for apples-to-apples vs C++.
num_threads = 1
