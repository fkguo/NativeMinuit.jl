name: TagBot

# Creates the git tag + GitHub release for each version registered in the
# General registry (triggered by the JuliaTagBot comment, or run manually via
# `workflow_dispatch`). The `ssh` key (DOCUMENTER_KEY, already used by docs.yml)
# makes TagBot push the tag over SSH so the tagged-release CI/docs workflows fire.
on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        default: "3"

permissions:
  actions: read
  checks: read
  contents: write
  deployments: read
  issues: read
  discussions: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  security-events: read
  statuses: read

jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ssh: ${{ secrets.DOCUMENTER_KEY }}
