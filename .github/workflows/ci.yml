name: CI

on:
  push:
    branches: [main]
    tags: ['*']
    # Skip CI when only documentation, benchmark artifacts, or tooling
    # changes — those have their own paths (docs.yml) or aren't tested
    # by `Pkg.test()`.
    paths-ignore:
      - 'docs/**'
      - 'benchmark/.julia-perf/**'
      - 'benchmark/cpp/build/**'
      - '**.md'
      - 'LICENSE'
      - 'CHANGELOG*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'benchmark/.julia-perf/**'
      - 'benchmark/cpp/build/**'
      - '**.md'
      - 'LICENSE'
      - 'CHANGELOG*'
  schedule:
    # Weekly full-matrix sweep — Mondays 06:00 UTC = catch any
    # version/OS regression that the per-push minimal CI misses.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Per-push minimal: just Julia 1 on Ubuntu. ~5 billable minutes,
  # gives fast feedback. macos is 10× billing — only on schedule/tag.
  test-minimal:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    name: Julia 1 - ubuntu-latest - ${{ github.event_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
          arch: x64
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: '4'
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
        continue-on-error: true   # codecov upload is best-effort

  # Full matrix: tags + weekly schedule + manual dispatch. macos-14
  # (Apple Silicon) is the developer's native arch; Julia 1.10 is the
  # declared LTS-class compat floor (Project.toml: julia = "1.10").
  test-full:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - full
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'              # LTS-class compat floor
          - '1'                 # current stable
        os:
          - ubuntu-latest
          - macOS-latest
        arch:
          - x64
        include:
          # Apple Silicon native — only on Julia 1 (latest)
          - os: macos-14
            version: '1'
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: '4'
