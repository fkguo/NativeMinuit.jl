name: Documentation

on:
  push:
    branches:
      - main
    tags: ['*']
    # Only rebuild docs when the docs source / docstring source actually
    # changes — skip the 5-minute build on test-only or CI-config commits.
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs.yml'
  # Skip docs on PR — preview-rendering rarely needs verification and the
  # PR loop is already covered by CI's docstring-syntax check.
  workflow_dispatch:

# Cancel intermediate builds for the same branch
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    permissions:
      actions: write          # for julia-actions/cache
      contents: write          # for gh-pages push
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - uses: julia-actions/cache@v2

      - name: Instantiate
        shell: julia --project=docs --color=yes {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()

      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        # auth
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}    # ssh key (optional)
        run: julia --project=docs --color=yes docs/make.jl
